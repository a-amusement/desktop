<!DOCTYPE html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; style-src 'self' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; script-src 'self';"
    />
    <title>a-amusement</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="titlebar" role="banner">
      <div class="titlebar-drag">
        <div class="brand" aria-hidden="true">
          <svg
            class="brand-mark"
            viewBox="0 0 24 24"
            fill="none"
            xmlns="http://www.w3.org/2000/svg"
          >
            <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="1.5" />
            <path
              d="M8 14.5c1.2-2.2 2.4-3.3 4-3.3s2.8 1.1 4 3.3"
              stroke="currentColor"
              stroke-width="1.5"
              stroke-linecap="round"
            />
            <circle cx="9" cy="10" r="1.1" fill="currentColor" />
            <circle cx="15" cy="10" r="1.1" fill="currentColor" />
          </svg>
          <span class="brand-name">a-amusement</span>
        </div>
      </div>

      <div class="titlebar-actions">
        <button
          type="button"
          class="action-btn"
          id="btn-debug-mode"
          aria-label="Turn debug mode on"
          title="Turn debug mode on"
          aria-pressed="false"
        >
          <svg viewBox="0 0 12 12" aria-hidden="true">
            <path
              d="M4 4.2h4M3 6.2H1.8M10.2 6.2H9M3.5 3.2 2.7 2.4M8.5 3.2l.8-.8M3.5 9.2l-.8.8M8.5 9.2l.8.8M4 2.8h4v1.4H4zM3.5 4.2h5v3.6a2.5 2.5 0 0 1-5 0z"
              fill="none"
              stroke="currentColor"
              stroke-width="1"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>
        </button>
        <button
          type="button"
          class="action-btn"
          id="btn-clear-data"
          aria-label="Clear app data"
          title="Clear saved data"
        >
          <svg viewBox="0 0 12 12" aria-hidden="true">
            <path
              d="M2 3.5h8M4.5 3.5V2.5h3v1M5 5.5v3M7 5.5v3M3.5 3.5l.5 6a1 1 0 0 0 1 .9h2a1 1 0 0 0 1-.9l.5-6"
              fill="none"
              stroke="currentColor"
              stroke-width="1"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>
        </button>
      </div>

      <div class="window-controls">
        <button
          type="button"
          class="control-btn"
          id="btn-minimize"
          aria-label="Minimize"
          title="Minimize"
        >
          <svg viewBox="0 0 12 12" aria-hidden="true">
            <rect x="1" y="5.5" width="10" height="1" fill="currentColor" />
          </svg>
        </button>
        <button
          type="button"
          class="control-btn"
          id="btn-maximize"
          aria-label="Maximize"
          title="Maximize"
        >
          <svg viewBox="0 0 12 12" aria-hidden="true" id="icon-maximize">
            <rect
              x="1.5"
              y="1.5"
              width="9"
              height="9"
              fill="none"
              stroke="currentColor"
              stroke-width="1"
            />
          </svg>
          <svg
            viewBox="0 0 12 12"
            aria-hidden="true"
            id="icon-restore"
            class="hidden"
          >
            <path
              d="M3.5 2.5h5v5M2.5 4.5v5h5"
              fill="none"
              stroke="currentColor"
              stroke-width="1"
            />
          </svg>
        </button>
        <button
          type="button"
          class="control-btn control-btn-close"
          id="btn-close"
          aria-label="Hide to tray"
          title="Hide to tray"
        >
          <svg viewBox="0 0 12 12" aria-hidden="true">
            <path
              d="M2 2l8 8M10 2L2 10"
              stroke="currentColor"
              stroke-width="1.2"
              stroke-linecap="round"
            />
          </svg>
        </button>
      </div>
    </header>

    <script src="titlebar.js"></script>
  </body>
</html>
